<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - EarnPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .list-container { padding: 20px; }
        .user-row { background: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .rank { width: 30px; font-weight: bold; color: #667eea; }
        .u-info { flex-grow: 1; margin-left: 10px; }
        .u-coins { color: #2ecc71; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-decoration: none; color: #888; text-align: center; font-size: 11px; flex: 1; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-trophy" style="font-size: 40px; color: #f1c40f; margin-bottom: 10px;"></i>
        <h2>Top 50 Earners</h2>
    </div>
    <div class="list-container" id="leaderboardList">Loading...</div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><br>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i><br>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><br>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><br>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        const q = query(collection(db, "users"), orderBy("coins", "desc"), limit(50));
        onSnapshot(q, (snap) => {
            let html = "";
            let rank = 1;
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="user-row">
                    <div class="rank">#${rank++}</div>
                    <div class="u-info"><b>${d.name || 'User'}</b></div>
                    <div class="u-coins">${(d.coins || 0).toLocaleString()} 💰</div>
                </div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html;
        });
    </script>
</body>
</html>
