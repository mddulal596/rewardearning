<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .top-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        
        .leaderboard-container { margin: -20px 15px 20px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; transition: 0.3s; }
        .user-row:last-child { border-bottom: none; }
        
        .rank { width: 40px; font-weight: bold; font-size: 18px; color: #764ba2; text-align: center; }
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin: 0 15px; border: 2px solid #eee; }
        .user-info { flex-grow: 1; }
        .user-name { font-weight: bold; color: #333; margin: 0; font-size: 15px; }
        .user-coins { font-size: 13px; color: #27ae60; font-weight: bold; margin: 2px 0 0; }
        
        /* Top 3 Special Style */
        .rank-1 { color: #f1c40f; font-size: 24px; }
        .rank-2 { color: #bdc3c7; font-size: 20px; }
        .rank-3 { color: #cd7f32; font-size: 20px; }

        #loader { text-align: center; padding: 50px; color: #667eea; }
    </style>
</head>
<body>

    <div class="top-header">
        <i class="fas fa-trophy" style="font-size: 40px; color: #f1c40f; margin-bottom: 10px;"></i>
        <h2 style="margin: 0;">Top 50 Earners</h2>
        <p style="opacity: 0.8; font-size: 13px;">সবচেয়ে বেশি ইনকাম করা সেরা ৫০ জন</p>
    </div>

    <div class="leaderboard-container" id="leaderboardList">
        <div id="loader">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Loading Rankings...</p>
        </div>
    </div>

    <nav style="position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000;">
        <a href="index.html" style="color:#888; text-decoration: none;"><i class="fa fa-home fa-lg"></i></a>
        <a href="earn.html" style="color:#888; text-decoration: none;"><i class="fa fa-bolt fa-lg"></i></a>
        <a href="withdraw.html" style="color:#888; text-decoration: none;"><i class="fa fa-wallet fa-lg"></i></a>
        <a href="profile.html" style="color:#888; text-decoration: none;"><i class="fa fa-user fa-lg"></i></a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        async function loadLeaderboard() {
            const listDiv = document.getElementById('leaderboardList');
            
            try {
                // ১. Firestore থেকে কয়েন অনুযায়ী বড় থেকে ছোট ক্রমানুসারে ৫০ জনকে নেওয়া
                const usersRef = collection(db, "users");
                const q = query(usersRef, orderBy("coins", "desc"), limit(50));
                const querySnapshot = await getDocs(q);
                
                let html = "";
                let rank = 1;

                if (querySnapshot.empty) {
                    listDiv.innerHTML = "<p style='padding:20px; text-align:center;'>No users found yet.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const photo = data.photo || "https://via.placeholder.com/50";
                    const name = data.name || "User";
                    const coins = data.coins || 0;

                    // র‍্যাঙ্ক অনুযায়ী স্পেশাল কালার ক্লাস
                    let rankClass = "";
                    if(rank === 1) rankClass = "rank-1";
                    else if(rank === 2) rankClass = "rank-2";
                    else if(rank === 3) rankClass = "rank-3";

                    html += `
                        <div class="user-row">
                            <div class="rank ${rankClass}">${rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}</div>
                            <img src="${photo}" class="profile-pic" alt="user">
                            <div class="user-info">
                                <p class="user-name">${name}</p>
                                <p class="user-coins"><i class="fas fa-coins"></i> ${coins.toLocaleString()} Coins</p>
                            </div>
                        </div>
                    `;
                    rank++;
                });

                listDiv.innerHTML = html;

            } catch (error) {
                console.error("Leaderboard Error:", error);
                listDiv.innerHTML = "<p style='padding:20px; text-align:center; color:red;'>Failed to load leaderboard.</p>";
            }
        }

        loadLeaderboard();
    </script>
</body>
</html>
