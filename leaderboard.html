<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - EarnPro Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .top-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        
        .leaderboard-container { margin: -20px 15px 20px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; min-height: 200px; }
        
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f8f9fa; transition: 0.3s; }
        .user-row:last-child { border-bottom: none; }
        
        .rank { width: 45px; font-weight: bold; font-size: 16px; color: #764ba2; text-align: center; }
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin: 0 12px; border: 2px solid #f0f0f0; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #667eea; overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-info { flex-grow: 1; }
        .user-name { font-weight: bold; color: #333; margin: 0; font-size: 15px; }
        .user-coins { font-size: 13px; color: #27ae60; font-weight: bold; margin: 2px 0 0; }
        
        .rank-1 { color: #f1c40f; font-size: 24px !important; }
        .rank-2 { color: #bdc3c7; font-size: 22px !important; }
        .rank-3 { color: #cd7f32; font-size: 22px !important; }

        #loader { text-align: center; padding: 50px; color: #667eea; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { color: #aaa; text-decoration: none; text-align: center; flex: 1; font-size: 11px; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }
        .nav-item.active { color: #667eea; }
    </style>
</head>
<body>

    <div class="top-header">
        <i class="fas fa-trophy" style="font-size: 40px; color: #f1c40f; margin-bottom: 10px;"></i>
        <h2 style="margin: 0;">Top 50 Earners</h2>
        <p style="opacity: 0.8; font-size: 13px;">সবচেয়ে বেশি ইনকাম করা সেরা ৫০ জন</p>
    </div>

    <div class="leaderboard-container" id="leaderboardList">
        <div id="loader">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 10px;">Loading Rankings...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // ১. টেলিগ্রাম ব্যাক বাটন হ্যান্ডলিং
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                window.location.href = "index.html";
            });
        }

        // ২. লিডারবোর্ড লোড করার ফাংশন (Real-time)
        function loadLeaderboard() {
            const listDiv = document.getElementById('leaderboardList');
            const usersRef = collection(db, "users");
            const q = query(usersRef, orderBy("coins", "desc"), limit(50));

            // onSnapshot ব্যবহার করা হয়েছে যাতে কেউ কয়েন ইনকাম করলে সাথে সাথে আপডেট হয়
            onSnapshot(q, (querySnapshot) => {
                let html = "";
                let rank = 1;

                if (querySnapshot.empty) {
                    listDiv.innerHTML = "<p style='padding:40px; text-align:center; color:#888;'>No users found yet.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const name = data.name || "Unknown User";
                    const coins = data.coins || 0;
                    const photo = data.photo; 
                    const initial = name.charAt(0).toUpperCase();

                    let rankDisplay = rank;
                    let rankClass = "";

                    // টপ ৩ জনের জন্য স্পেশাল ইমোজি ও স্টাইল
                    if(rank === 1) { rankDisplay = '🥇'; rankClass = "rank-1"; }
                    else if(rank === 2) { rankDisplay = '🥈'; rankClass = "rank-2"; }
                    else if(rank === 3) { rankDisplay = '🥉'; rankClass = "rank-3"; }
                    else { rankDisplay = `#${rank}`; }

                    // ছবি থাকলে ছবি দেখাবে, না থাকলে নামের প্রথম অক্ষর (Avatar)
                    const avatarContent = photo ? `<img src="${photo}" alt="user">` : initial;

                    html += `
                        <div class="user-row">
                            <div class="rank ${rankClass}">${rankDisplay}</div>
                            <div class="profile-pic">${avatarContent}</div>
                            <div class="user-info">
                                <p class="user-name">${name}</p>
                                <p class="user-coins"><i class="fas fa-coins"></i> ${coins.toLocaleString()} Coins</p>
                            </div>
                        </div>
                    `;
                    rank++;
                });

                listDiv.innerHTML = html;

            }, (error) => {
                console.error("Leaderboard Error:", error);
                listDiv.innerHTML = "<p style='padding:20px; text-align:center; color:#ff4d4d;'>Failed to sync data.</p>";
            });
        }

        loadLeaderboard();
    </script>
</body>
</html>
