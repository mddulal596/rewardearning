<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #adminAuth { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f0f2f5; }
        #adminContent { display: none; padding: 20px; }
        .table-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #667eea; color: white; font-size: 14px; }
        .btn-approve { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="adminAuth">
        <div class="balance-card" style="width: 300px;">
            <h3>Admin Access</h3>
            <input type="password" id="adminPass" placeholder="Enter Password" style="width:100%; padding:12px; margin: 15px 0; border-radius: 10px; border: 1px solid #ddd;">
            <button id="loginBtn" class="btn-submit" style="background:#667eea; color:white; width:100%; padding:12px; border:none; border-radius:10px; cursor:pointer;">Login</button>
        </div>
    </div>

    <div id="adminContent">
        <h2 style="color: #444;">Pending Withdrawals</h2>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Method</th>
                        <th>Number</th>
                        <th>Coins</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="withdrawTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        document.getElementById('loginBtn').onclick = () => {
            if (document.getElementById('adminPass').value === "Admin@9900") {
                document.getElementById('adminAuth').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadRequests();
            } else { alert("ভুল পাসওয়ার্ড!"); }
        };

        async function loadRequests() {
            const table = document.getElementById('withdrawTable');
            table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>লোড হচ্ছে...</td></tr>";
            
            const q = query(collection(db, "withdrawals"), where("status", "==", "pending"));
            const snap = await getDocs(q);
            table.innerHTML = "";

            if (snap.empty) {
                table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>কোনো রিকোয়েস্ট নেই।</td></tr>";
                return;
            }

            snap.forEach((d) => {
                const data = d.data();
                table.innerHTML += `
                    <tr>
                        <td style="font-size:12px;">${data.name}</td>
                        <td>${data.method}</td>
                        <td>${data.number}</td>
                        <td><b>${data.amount}</b></td>
                        <td><button class="btn-approve" onclick="approveRequest('${d.id}')">Approve</button></td>
                    </tr>
                `;
            });
        }

        window.approveRequest = async (id) => {
            if (confirm("আপনি কি পেমেন্ট করেছেন?")) {
                await updateDoc(doc(db, "withdrawals", id), { status: "approved" });
                alert("Approved Successfully!");
                loadRequests();
            }
        };
    </script>
</body>
</html>
