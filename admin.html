<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #adminAuth { height: 100vh; display: flex; justify-content: center; align-items: center; }
        #adminContent { display: none; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #667eea; color: white; }
        .btn-approve { background: #2ecc71; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="adminAuth">
        <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            <h3>Admin Login</h3>
            <input type="password" id="pass" style="padding:10px; margin-bottom:10px; width:100%;"><br>
            <button onclick="login()" style="width:100%; padding:10px; background:#667eea; color:white; border:none;">Login</button>
        </div>
    </div>

    <div id="adminContent">
        <h2>Withdrawal Requests</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Method</th>
                    <th>Number</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="reqTable"></tbody>
        </table>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        window.login = () => {
            if(document.getElementById('pass').value === "Admin@9900") {
                document.getElementById('adminAuth').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else { alert("Wrong Password!"); }
        };

        async function loadData() {
            const table = document.getElementById('reqTable');
            table.innerHTML = "";
            const q = query(collection(db, "withdrawals"), where("status", "==", "pending"));
            const snap = await getDocs(q);
            snap.forEach(d => {
                const data = d.data();
                table.innerHTML += `
                    <tr>
                        <td>${data.name}</td>
                        <td>${data.method}</td>
                        <td>${data.number}</td>
                        <td>${data.amount}</td>
                        <td><button class="btn-approve" onclick="approve('${d.id}')">Approve</button></td>
                    </tr>
                `;
            });
        }

        window.approve = async (id) => {
            if(confirm("Confirm Payment?")) {
                await updateDoc(doc(db, "withdrawals", id), { status: "approved" });
                alert("Success!");
                loadData();
            }
        };
    </script>
</body>
</html>
