<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <i class="fa fa-user-circle" style="font-size: 40px; color: white; margin-right: 10px;"></i>
            <div>
                <span id="topUserName">Loading...</span><br>
                <small>Verified User</small>
            </div>
        </div>
        <div class="balance-info">
            <small>My Balance</small><br>
            <strong><span id="userCoins">0</span> 💰</strong>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Daily Tasks</h3>
        <button id="checkInBtn" class="btn-main" style="background: #6c5ce7; margin-bottom: 10px; width: 100%;">Daily Check-in (+10)</button>
        <button id="watchAdBtn" class="btn-main" style="background: #27ae60; margin-bottom: 10px; width: 100%;">Watch Ad & Earn (+5)</button>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div style="text-align: center;">
            <h4>Lucky Spin</h4>
            <div id="wheel-container" style="font-size: 80px; margin: 15px auto; transition: transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67); width: fit-content;">
                🎡
            </div>
            <button id="spinBtn" class="btn-main" style="background: #f39c12; width: 80%;">Spin Now</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fa fa-home"></i>Home</a>
        <a href="profile.html" class="nav-item"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
