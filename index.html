<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--primary); color: white; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <div style="display: flex; align-items: center;">
            <i class="fa fa-user-circle" style="font-size: 40px; margin-right: 12px;"></i>
            <div style="text-align: left;">
                <span id="topUserName" style="font-weight: bold; font-size: 16px; display: block;">Loading...</span>
                <small style="background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 10px;">Verified User</small>
            </div>
        </div>
        <div style="text-align: right; background: rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);">
            <small style="font-size: 10px; display: block; opacity: 0.8;">BALANCE</small>
            <span style="font-size: 18px; font-weight: 800; color: #f1c40f;">
                <span id="userCoins">0</span> <i class="fa fa-coins"></i>
            </span>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top: 0; color: #444;"><i class="fa fa-tasks"></i> Daily Tasks</h3>
        <button id="checkInBtn" class="btn-main" style="margin-bottom: 12px;">Daily Check-in (+10)</button>
        <button id="watchAdBtn" class="btn-main" style="background: #27ae60; margin-bottom: 20px;">Watch Ad & Earn (+5)</button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div style="text-align: center;">
            <h4 style="margin: 0; color: #555;">Lucky Spin</h4>
            <div id="wheel-container" style="font-size: 70px; margin: 15px auto; transition: transform 3s cubic-bezier(0.17, 0.67, 0.83, 0.67); width: fit-content;">
                🎡
            </div>
            <button id="spinBtn" class="btn-main" style="background: #f39c12; width: 80%;">Spin Now</button>
        </div>
    </div>

    <div id="chat-icon" style="position: fixed; bottom: 85px; right: 20px; background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;">
        <i class="fas fa-comment-dots"></i>
    </div>

    <div id="chat-window" style="display: none; position: fixed; bottom: 90px; right: 20px; width: 280px; height: 380px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1001; flex-direction: column; overflow: hidden;">
        <div style="background: var(--primary); color: white; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
            <span>EarnPro AI Support</span>
            <i class="fas fa-times" id="close-chat" style="cursor: pointer;"></i>
        </div>
        <div id="chat-content" style="flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; background: #f9f9f9; display: flex; flex-direction: column;">
            <div style="background: #eee; padding: 8px 12px; border-radius: 12px; margin-bottom: 10px; align-self: flex-start; max-width: 80%;">সালাম! আমি আপনার পার্সোনাল অ্যাসিস্ট্যান্ট। আমাকে ইনকাম বা পেমেন্ট নিয়ে কিছু জিজ্ঞেস করুন।</div>
        </div>
        <div style="padding: 10px; border-top: 1px solid #eee; display: flex; align-items: center;">
            <input type="text" id="chat-input" placeholder="এখানে লিখুন..." style="flex: 1; border: none; outline: none; padding: 5px;">
            <i class="fas fa-paper-plane" id="send-chat" style="color: #764ba2; cursor: pointer; font-size: 18px; margin-left: 10px;"></i>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fa fa-home"></i>Home</a>
        <a href="profile.html" class="nav-item"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
