<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; padding-bottom: 90px; }
        .card { background: white; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-withdraw { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div style="background: #667eea; color: white; padding: 30px; text-align: center;">
        <h2>Withdraw Coins</h2>
        <p>আপনার ব্যালেন্স: <span id="currentBalance">0</span> Coins</p>
    </div>

    <div class="card">
        <select id="method" class="input-field">
            <option value="bKash">bKash</option>
            <option value="Nagad">Nagad</option>
            <option value="Rocket">Rocket</option>
        </select>
        <input type="number" id="accountNo" class="input-field" placeholder="Account Number">
        <input type="number" id="amount" class="input-field" placeholder="Amount (Min 5000)">
        <button class="btn-withdraw" id="submitBtn">Submit Request</button>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, getDoc, updateDoc, collection, addDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");
        let userBalance = 0;
        let userName = "";

        async function init() {
            if(!tgId) return window.location.href="login.html";
            const snap = await getDoc(doc(db, "users", tgId));
            if(snap.exists()){
                userBalance = snap.data().coins || 0;
                userName = snap.data().name || "User";
                document.getElementById('currentBalance').innerText = userBalance;
            }
        }
        init();

        document.getElementById('submitBtn').onclick = async () => {
            const method = document.getElementById('method').value;
            const number = document.getElementById('accountNo').value;
            const amount = parseInt(document.getElementById('amount').value);

            // ব্যালেন্স চেক
            if(amount > userBalance) return Swal.fire('Error', 'Insufficient Balance!', 'error');
            
            // এখানে ৫০০ এর জায়গায় ৫০০০ এর লজিক দেওয়া হয়েছে
            if(amount < 5000) return Swal.fire('Error', 'Minimum 5000 coins required!', 'error');

            try {
                Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

                // ১. ব্যালেন্স থেকে কয়েন কেটে নেওয়া
                await updateDoc(doc(db, "users", tgId), { coins: increment(-amount) });
                
                // ২. রিকোয়েস্ট তৈরি করা
                await addDoc(collection(db, "withdrawals"), {
                    userId: tgId,
                    name: userName,
                    method: method,
                    number: number,
                    amount: amount,
                    status: "pending",
                    timestamp: Date.now()
                });

                Swal.fire('Success', 'উইথড্র রিকোয়েস্ট সফলভাবে পাঠানো হয়েছে!', 'success').then(()=> location.reload());
            } catch(e) { Swal.fire('Error', e.message, 'error'); }
        };
    </script>
</body>
</html>
