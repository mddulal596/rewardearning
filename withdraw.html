<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - EarnPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header" style="background:#667eea;color:white;padding:30px;text-align:center;">
        <h2>Withdraw</h2>
    </div>

    <div class="card" style="margin:20px;padding:20px;background:white;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.05);">
        <p>Your Balance: <b id="userCoins">0</b> Coins</p>
        <form id="withdrawForm">
            <select id="method" class="input-field" style="width:100%;padding:10px;margin:10px 0;">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
            </select>
            <input type="number" id="num" placeholder="Account Number" class="input-field" style="width:100%;padding:10px;margin:10px 0;" required>
            <input type="number" id="amount" placeholder="Min 500 Coins" class="input-field" style="width:100%;padding:10px;margin:10px 0;" required>
            <button type="submit" id="submitBtn" class="btn-main" style="background:#667eea;color:white;border:none;width:100%;padding:15px;border-radius:10px;">Submit</button>
        </form>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");

        async function load() {
            if (!tgId) return window.location.replace("login.html");
            const snap = await getDoc(doc(db, "users", tgId));
            if (snap.exists()) document.getElementById('userCoins').innerText = snap.data().coins || 0;
        }

        document.getElementById('withdrawForm').onsubmit = async (e) => {
            e.preventDefault();
            const method = document.getElementById('method').value;
            const number = document.getElementById('num').value;
            const amount = parseInt(document.getElementById('amount').value);
            
            const snap = await getDoc(doc(db, "users", tgId));
            if (snap.data().coins < amount || amount < 500) {
                alert("Insufficient coins or below minimum!");
                return;
            }

            await addDoc(collection(db, "withdrawals"), {
                uid: tgId,
                name: snap.data().name,
                method, number, amount, status: "Pending", timestamp: new Date().toISOString()
            });

            await updateDoc(doc(db, "users", tgId), { coins: increment(-amount) });

            // Telegram Notification
            const msg = `💰 *New Request*\nUser: ${snap.data().name}\nAmount: ${amount}\nMethod: ${method}\nNumber: ${number}`;
            fetch(`https://api.telegram.org/bot8663196887:AAGF_5h90yS70FV6yPZWiM-MtDrRXoTzTZM/sendMessage?chat_id=-1003803044476&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

            alert("Request sent successfully!");
            location.reload();
        };
        load();
    </script>
</body>
</html>
