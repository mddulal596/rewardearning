<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .history-link { position: absolute; top: 20px; right: 20px; color: white; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 8px; text-decoration: none; font-size: 12px; }
        .balance-card { background: white; margin: -30px 20px 20px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .method-item { background: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .method-item img { width: 50px; height: 50px; margin-bottom: 8px; object-fit: contain; }
        .method-item.selected { border-color: #667eea; background: #f0f4ff; transform: scale(1.05); }
        .input-box { padding: 20px; }
        .w-input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; }
        .btn-withdraw { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* Bottom Navigation Styling */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-decoration: none; color: #888; text-align: center; font-size: 11px; flex: 1; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }
        .nav-item.active { color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <a href="history.html" class="history-link"><i class="fas fa-history"></i> History</a>
        <h2>Withdraw</h2>
    </div>

    <div class="balance-card">
        <p>Total Balance</p>
        <h1 id="userCoins">0</h1>
    </div>

    <div class="method-grid">
        <div class="method-item" onclick="selectMethod('bKash', this)">
            <img src="https://raw.githubusercontent.com/Ariful-Islam-720/Logo-Store/main/bkash.png" alt="bKash">
            <b>bKash</b>
        </div>
        <div class="method-item" onclick="selectMethod('Nagad', this)">
            <img src="https://raw.githubusercontent.com/Ariful-Islam-720/Logo-Store/main/nagad.png" alt="Nagad">
            <b>Nagad</b>
        </div>
    </div>

    <div class="input-box">
        <input type="number" id="withdrawAmount" class="w-input" placeholder="Amount (min 5000)">
        <input type="text" id="walletNumber" class="w-input" placeholder="Wallet Number">
        <button class="btn-withdraw" id="submitBtn">Submit Withdrawal</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item active"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, getDoc, addDoc, collection, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        
        const tgId = localStorage.getItem("tg_user_id");
        let selectedMethod = "";
        let currentBalance = 0;
        let userName = "User";

        async function loadUser() {
            if (!tgId) return;
            const snap = await getDoc(doc(db, "users", tgId));
            if (snap.exists()) {
                currentBalance = snap.data().coins || 0;
                userName = snap.data().name || "User";
                document.getElementById('userCoins').innerText = currentBalance.toLocaleString();
            }
        }
        loadUser();

        window.selectMethod = (method, el) => {
            selectedMethod = method;
            document.querySelectorAll('.method-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        };

        document.getElementById('submitBtn').onclick = async () => {
            const amount = Number(document.getElementById('withdrawAmount').value);
            const num = document.getElementById('walletNumber').value;
            
            if(!selectedMethod) return Swal.fire('Wait', 'পেমেন্ট মেথড সিলেক্ট করুন!', 'warning');
            if(amount < 5000) return Swal.fire('Error', 'সর্বনিম্ন ৫০০০ কয়েন লাগবে!', 'error');
            if(amount > currentBalance) return Swal.fire('Error', 'আপনার ব্যালেন্স কম!', 'error');
            if(!num) return Swal.fire('Wait', 'ওয়ালেট নম্বর দিন!', 'warning');

            try {
                await addDoc(collection(db, "withdrawals"), {
                    uid: tgId,
                    userName: userName,
                    method: selectedMethod,
                    amount: amount,
                    number: num,
                    status: "Pending",
                    timestamp: Date.now()
                });
                await updateDoc(doc(db, "users", tgId), { coins: increment(-amount) });
                Swal.fire('Success', 'আপনার রিকোয়েস্ট সফল হয়েছে!', 'success').then(() => location.reload());
            } catch (e) {
                Swal.fire('Error', 'কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন!', 'error');
            }
        };
    </script>
</body>
</html>
