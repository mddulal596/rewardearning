<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* অতিরিক্ত ইনলাইন স্টাইল যাতে ফর্মটি সুন্দর দেখায় */
        .withdraw-card { background: var(--white); margin: -20px 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; background: #f9f9f9; font-size: 15px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #667eea; background: #fff; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Withdraw</h2>
        <p style="opacity:0.9; font-size: 14px;">আপনার ব্যালেন্স: <span id="currentBalance">0</span> Coins</p>
    </div>

    <div class="withdraw-card">
        <div class="input-group">
            <label>পেমেন্ট মেথড বেছে নিন</label>
            <select id="method" class="input-field">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>
        </div>

        <div class="input-group">
            <label>অ্যাকাউন্ট নম্বর</label>
            <input type="number" id="accountNo" class="input-field" placeholder="01XXXXXXXXX">
        </div>

        <div class="input-group">
            <label>কয়েন এর পরিমাণ (মিনিমাম ৫০০০)</label>
            <input type="number" id="amount" class="input-field" placeholder="Min 5000 Coins">
        </div>

        <button class="btn-submit" id="submitBtn">Submit Request</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item active"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, getDoc, updateDoc, collection, addDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");
        let userBalance = 0;
        let userName = "";

        async function init() {
            if (!tgId) { window.location.replace("login.html"); return; }
            const snap = await getDoc(doc(db, "users", tgId));
            if (snap.exists()) {
                userBalance = snap.data().coins || 0;
                userName = snap.data().name || "User";
                document.getElementById('currentBalance').innerText = userBalance.toLocaleString();
            }
        }
        init();

        document.getElementById('submitBtn').onclick = async () => {
            const method = document.getElementById('method').value;
            const number = document.getElementById('accountNo').value;
            const amount = parseInt(document.getElementById('amount').value);

            if (!number || number.length < 11) {
                return Swal.fire('Error', 'সঠিক নম্বর দিন!', 'error');
            }
            if (isNaN(amount) || amount < 5000) {
                return Swal.fire('Error', 'মিনিমাম উইথড্র ৫০০০ কয়েন!', 'error');
            }
            if (amount > userBalance) {
                return Swal.fire('Error', 'আপনার পর্যাপ্ত ব্যালেন্স নেই!', 'error');
            }

            try {
                Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                // ১. ব্যালেন্স কাটা
                await updateDoc(doc(db, "users", tgId), { coins: increment(-amount) });

                // ২. রিকোয়েস্ট জমা দেওয়া
                await addDoc(collection(db, "withdrawals"), {
                    userId: tgId,
                    name: userName,
                    method: method,
                    number: number,
                    amount: amount,
                    status: "pending",
                    timestamp: Date.now()
                });

                Swal.fire('Success', 'উইথড্র রিকোয়েস্ট সফল হয়েছে!', 'success').then(() => location.reload());
            } catch (e) {
                Swal.fire('Error', e.message, 'error');
            }
        };
    </script>
</body>
</html>
