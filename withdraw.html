<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="card balance-card">
        <p>Available Balance</p>
        <h2 id="userCoins">...</h2>
        <small>Coins</small>
    </div>

    <div class="card">
        <h4>Withdraw Request</h4>
        <form id="withdrawForm">
            <label>Payment Method</label>
            <select id="method" class="input-field">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>

            <label>Account Number</label>
            <input type="number" id="num" placeholder="017xxxxxxxx" class="input-field" required>

            <label>Amount (Minimum 500 Coins)</label>
            <input type="number" id="amount" placeholder="Minimum 500" class="input-field" min="500" required>

            <button type="submit" class="btn-main" id="submitBtn">Submit Request</button>
        </form>
    </div>

    <div class="card" style="font-size: 12px; color: #666;">
        <p><i class="fa fa-info-circle"></i> পেমেন্ট রিকোয়েস্ট দেওয়ার ২৪-৪৮ ঘণ্টার মধ্যে পেমেন্ট কমপ্লিট করা হবে।</p>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fa fa-gamepad"></i>Earn</a>
        <a href="tasks.html" class="nav-item"><i class="fa fa-tasks"></i>Tasks</a>
        <a href="withdraw.html" class="nav-item active"><i class="fa fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { collection, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // ইউজার লগইন চেক ও ব্যালেন্স লোড
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    document.getElementById('userCoins').innerText = snap.data().coins || 0;
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // উইথড্র ফর্ম সাবমিট লজিক
        document.getElementById('withdrawForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const user = auth.currentUser;
            const method = document.getElementById('method').value;
            const number = document.getElementById('num').value;
            const amount = parseInt(document.getElementById('amount').value);
            const submitBtn = document.getElementById('submitBtn');

            if (!user) return alert("Please Login!");

            // বাটন ডিজেবল করা যাতে ডবল ক্লিক না হয়
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                const currentCoins = snap.data().coins || 0;

                if (currentCoins < amount) {
                    alert("আপনার পর্যাপ্ত কয়েন নেই!");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Request";
                    return;
                }

                // ১. withdrawals কালেকশনে রিকোয়েস্ট সেভ করা
                await addDoc(collection(db, "withdrawals"), {
                    uid: user.uid,
                    email: user.email, // এডমিনের দেখার জন্য
                    method: method,
                    number: number,
                    amount: amount,
                    status: "Pending",
                    timestamp: Date.now()
                });

                // ২. ইউজারের অ্যাকাউন্ট থেকে কয়েন কেটে নেওয়া
                await updateDoc(userRef, {
                    coins: increment(-amount)
                });

                alert("উইথড্র রিকোয়েস্ট সফল হয়েছে!");
                location.reload();

            } catch (error) {
                console.error("Error:", error);
                alert("কিছু একটা ভুল হয়েছে। আবার চেষ্টা করুন।");
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Request";
            }
        };
    </script>
</body>
</html>
