<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Money - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; padding-bottom: 90px; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .earn-card { background: white; padding: 20px; border-radius: 20px; margin: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .btn-earn { width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #wheel-container { font-size: 80px; margin: 20px 0; display: inline-block; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Earn Coins</h2>
        <p>টাস্ক পূরণ করুন এবং কয়েন ইনকাম করুন</p>
    </div>

    <div style="padding: 15px;">
        <button id="checkInBtn" class="btn-earn" style="background: #5c6bc0;"><i class="fa fa-calendar-check"></i> &nbsp; Daily Check-in (+10)</button>
        <button id="watchAdBtn" class="btn-earn" style="background: #2e7d32;"><i class="fa fa-play-circle"></i> &nbsp; Watch Video (+5)</button>

        <div class="earn-card">
            <h4>Lucky Spin</h4>
            <div id="wheel-container">🎡</div>
            <button id="spinBtn" class="btn-earn" style="background: #f39c12; margin-top: 10px;"><i class="fa fa-sync-alt"></i> &nbsp; Spin Now</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" style="text-decoration:none; color:#888; text-align:center;"><i class="fa fa-home"></i><br>Home</a>
        <a href="earn.html" style="text-decoration:none; color:#667eea; text-align:center;"><i class="fa fa-bolt"></i><br>Earn</a>
        <a href="withdraw.html" style="text-decoration:none; color:#888; text-align:center;"><i class="fa fa-wallet"></i><br>Withdraw</a>
        <a href="profile.html" style="text-decoration:none; color:#888; text-align:center;"><i class="fa fa-user"></i><br>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const userId = localStorage.getItem("tg_user_id");
        const AD_LINK = "https://middayopened.com/uuh65fp1c?key=0d0044249c1cef410a86dcfa8f7e3460";

        let spinning = false;
        document.getElementById('spinBtn').onclick = () => {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-container');
            const randomDeg = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(async () => {
                const bonus = Math.floor(Math.random() * 10) + 1;
                
                // ব্রাউজারের কনফার্মেশন বক্স ব্যবহার করে সমাধান
                if (confirm(`অভিনন্দন! আপনি ${bonus} কয়েন পেয়েছেন। কয়েনটি কালেক্ট করতে বিজ্ঞাপনটি দেখুন।`)) {
                    window.open(AD_LINK, '_blank');
                    const userRef = doc(db, "users", userId);
                    await updateDoc(userRef, { coins: increment(bonus) });
                }
                
                spinning = false;
                wheel.style.transform = `rotate(0deg)`;
            }, 4000);
        };

        // Watch Video Logic
        document.getElementById('watchAdBtn').onclick = async () => {
            window.open(AD_LINK, '_blank');
            await updateDoc(doc(db, "users", userId), { coins: increment(5) });
            alert("৫ কয়েন যোগ হয়েছে!");
        };
    </script>
</body>
</html>
