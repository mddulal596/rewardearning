<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #667eea;">EarnPro Official</h2>
        <div id="status-text">Authenticating...</div>
        <div class="loader"></div>
        <p style="font-size: 14px; color: #888;">Please wait while we connect your Telegram account.</p>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tele = window.Telegram.WebApp;
        tele.ready();

        async function handleAutoLogin() {
            const user = tele.initDataUnsafe?.user;

            if (user) {
                try {
                    const userRef = doc(db, "users", user.id.toString());
                    const snap = await getDoc(userRef);

                    if (!snap.exists()) {
                        await setDoc(userRef, {
                            uid: user.id.toString(),
                            name: user.first_name + (user.last_name ? " " + user.last_name : ""),
                            username: user.username || "user",
                            coins: 0,
                            referCode: "PRO" + Math.floor(1000 + Math.random() * 9000),
                            createdAt: new Date()
                        });
                    }
                    // লগইন সফল হলে সেশন সেভ করা এবং হোমপেজে পাঠানো
                    localStorage.setItem("tg_user_id", user.id.toString());
                    window.location.replace("index.html");
                } catch (error) {
                    document.getElementById('status-text').innerText = "Database Connection Failed!";
                }
            } else {
                document.getElementById('status-text').innerText = "Please open this from Telegram Bot.";
            }
        }

        handleAutoLogin();
    </script>
</body>
</html>
