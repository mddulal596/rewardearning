<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Login</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #667eea;">EarnPro Login</h2>
        <p>টেলিগ্রাম দিয়ে লগইন করুন এবং ইনকাম শুরু করুন!</p>
        
        <div id="telegram-login-container">
            </div>
    </div>

    <script type="module">
        import { auth } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

        // ইউজার লগইন হওয়ার সাথে সাথে অটোমেটিক হোমপেজে পাঠিয়ে দেবে
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // replace ব্যবহার করা হয়েছে যাতে ব্যাক বাটন চাপলে আবার লগইন পেজ না আসে
                window.location.replace("index.html"); 
            }
        });
    </script>
</body>
</html>
