<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #667eea;">Authenticating...</h2>
        <p>Please wait while we connect your account.</p>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tele = window.Telegram.WebApp;
        tele.ready();

        async function initApp() {
            const user = tele.initDataUnsafe?.user;
            if (user) {
                const userRef = doc(db, "users", user.id.toString());
                const snap = await getDoc(userRef);

                if (!snap.exists()) {
                    await setDoc(userRef, {
                        name: user.first_name + (user.last_name ? " " + user.last_name : ""),
                        username: user.username || "user",
                        coins: 0,
                        referCode: "PRO" + Math.floor(1000 + Math.random() * 9000),
                        createdAt: new Date()
                    });
                }
                localStorage.setItem("tg_user_id", user.id.toString());
                window.location.replace("index.html");
            } else {
                document.body.innerHTML = "<h1>Please open from Telegram Bot</h1>";
            }
        }
        initApp();
    </script>
</body>
</html>
