<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in - EarnPro Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .loader { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #667eea; font-size: 18px; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>Connecting to EarnPro Official...</h2>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tele = window.Telegram.WebApp;
        tele.ready();

        async function login() {
            const user = tele.initDataUnsafe?.user;
            
            if (user) {
                const uid = user.id.toString();
                const userRef = doc(db, "users", uid);
                const snap = await getDoc(userRef);

                // যদি ইউজার নতুন হয়, তবে ডাটাবেসে নতুন ডকুমেন্ট তৈরি হবে
                if (!snap.exists()) {
                    await setDoc(userRef, {
                        uid: uid,
                        name: user.first_name + (user.last_name ? " " + user.last_name : ""),
                        username: user.username || "user",
                        photo: user.photo_url || "",
                        coins: 0,
                        referCode: "PRO" + Math.floor(1000 + Math.random() * 9000),
                        
                        // গুরুত্বপূর্ণ: এই ফিল্ডগুলো না থাকলে প্রোফাইলে 0 দেখাবে
                        taskCount: 0,
                        referCount: 0,
                        
                        vip: "No",
                        status: "Active",
                        usedPromos: [],
                        createdAt: serverTimestamp()
                    });
                }
                
                // লোকাল স্টোরেজে আইডি সেভ করা যাতে অন্য পেজ থেকে ডাটা পাওয়া যায়
                localStorage.setItem("tg_user_id", uid);
                
                // সরাসরি হোম পেজে রিডাইরেক্ট
                window.location.replace("index.html");
            } else {
                // টেলিগ্রামের বাইরে থেকে ওপেন করলে এরর দেখাবে
                document.body.innerHTML = "<h2 style='color:red; text-align:center;'>Please open this from Telegram Bot!</h2>";
            }
        }
        
        // লগইন ফাংশন রান করা
        login();
    </script>
</body>
</html>
