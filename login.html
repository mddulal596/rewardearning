<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        .login-card img { width: 80px; margin-bottom: 20px; }
        .login-card h2 { margin: 0 0 10px; color: #333; }
        .login-card p { color: #777; font-size: 14px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" alt="Logo">
        <h2>EarnPro Login</h2>
        <p>টেলিগ্রাম দিয়ে এক ক্লিকে লগইন করুন এবং ইনকাম শুরু করুন!</p>
        
        <div id="telegram-login-container"></div>
    </div>

    <script type="module">
        import { auth } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

        // ইউজার লগইন হওয়ার সাথে সাথে অটোমেটিক হোমপেজে (index.html) চলে যাবে
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace("index.html"); 
            }
        });

        // এখানে আপনার টেলিগ্রাম লগইন স্ক্রিপ্ট কোডটি বসান (যেমন: script src="https://telegram.org/js/telegram-widget.js"...)
    </script>
</body>
</html>
