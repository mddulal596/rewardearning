<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>body{background:#f4f7f6;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;}</style>
</head>
<body>
    <div style="text-align:center;">
        <h2 style="color:#667eea;">Connecting to EarnPro...</h2>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tele = window.Telegram.WebApp;
        tele.ready();

        async function login() {
            const user = tele.initDataUnsafe?.user;
            if (user) {
                const uid = user.id.toString();
                const userRef = doc(db, "users", uid);
                const snap = await getDoc(userRef);

                if (!snap.exists()) {
                    await setDoc(userRef, {
                        name: user.first_name + (user.last_name ? " " + user.last_name : ""),
                        username: user.username || "user",
                        coins: 0,
                        referCode: "PRO" + Math.floor(1000 + Math.random() * 9000),
                        createdAt: new Date()
                    });
                }
                localStorage.setItem("tg_user_id", uid);
                window.location.replace("index.html");
            } else {
                alert("Please open this from Telegram Bot!");
            }
        }
        login();
    </script>
</body>
</html>
