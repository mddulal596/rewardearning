<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - EarnPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2>Create Account</h2>
        <input type="email" id="email" placeholder="Email Address" class="input-field">
        <input type="password" id="pass" placeholder="Create Password" class="input-field">
        <button id="signupBtn" class="btn-main">Create Account</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
    <script type="module">
        import { auth, db } from './firebase.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        document.getElementById('signupBtn').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { coins: 0, email: e, lastAdClick: 0 });
                alert("Account Created!"); window.location.href = "index.html";
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
</html>
