<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - EarnPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2>Create Account</h2>
        <input type="text" id="name" placeholder="Full Name" class="input-field" required>
        <input type="email" id="email" placeholder="Email Address" class="input-field" required>
        <input type="password" id="pass" placeholder="Create Password" class="input-field" required>
        
        <input type="text" id="referCodeInput" placeholder="Referral Code (Optional)" class="input-field" style="border: 1px dashed #667eea;">
        <small style="display: block; color: #888; margin-bottom: 10px;">রেফার কোড থাকলে ২০ কয়েন বোনাস পাবেন!</small>

        <button id="signupBtn" class="btn-main">Create Account</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, setDoc, getDocs, collection, query, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        document.getElementById('signupBtn').onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const referCodeInput = document.getElementById('referCodeInput').value.trim();

            if(!name || !email || !pass) {
                alert("সবগুলো তথ্য সঠিকভাবে দিন!");
                return;
            }

            try {
                // ১. একাউন্ট তৈরি
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const uid = res.user.uid;

                // ২. ডিফল্ট ডাটা এবং নতুন ইউজারের জন্য নিজস্ব রেফার কোড তৈরি
                const myReferCode = "PRO" + Math.floor(1000 + Math.random() * 9000);
                let initialCoins = 0;

                // ৩. রেফারেল কোড চেক করা
                if (referCodeInput !== "") {
                    const q = query(collection(db, "users"), where("referCode", "==", referCodeInput));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        // রেফারকারী সঠিক হলে তাকে ৫০ কয়েন বোনাস দেওয়া
                        const referrerDoc = querySnapshot.docs[0];
                        await updateDoc(doc(db, "users", referrerDoc.id), {
                            coins: increment(50),
                            referrals: increment(1)
                        });
                        // নতুন ইউজার ২০ কয়েন বোনাস পাবে
                        initialCoins = 20;
                        alert("Referral bonus added!");
                    } else {
                        alert("Invalid Referral Code! No bonus added.");
                    }
                }

                // ৪. ডাটাবেসে ইউজার ডাটা সেভ করা
                await setDoc(doc(db, "users", uid), {
                    name: name,
                    email: email,
                    coins: initialCoins,
                    referCode: myReferCode,
                    referrals: 0,
                    completedTasks: 0,
                    lastCheckIn: null,
                    lastAdWatch: null,
                    createdAt: new Date()
                });

                alert("Account Created Successfully!");
                window.location.href = "index.html";

            } catch (err) {
                alert(err.message);
            }
        };
    </script>
</body>
</html>
