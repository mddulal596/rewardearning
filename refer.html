<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .refer-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .refer-card { background: white; margin: -30px 20px 20px; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .promo-box { background: #f8f9fa; border: 2px dashed #667eea; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 24px; font-weight: bold; color: #667eea; letter-spacing: 2px; position: relative; cursor: pointer; }
        .copy-hint { font-size: 10px; color: #888; margin-top: 5px; }
        .share-btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .share-btn i { margin-right: 10px; }
        .steps { text-align: left; margin-top: 25px; padding: 0 10px; }
        .step-item { display: flex; align-items: center; margin-bottom: 15px; }
        .step-num { width: 25px; height: 25px; background: #667eea; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-right: 12px; flex-shrink: 0; }
        .step-text { font-size: 14px; color: #555; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; text-align: center; flex: 1; font-size: 10px; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="refer-header">
        <i class="fas fa-gift" style="font-size: 40px; color: #f1c40f; margin-bottom: 10px;"></i>
        <h2 style="margin: 0;">Refer & Earn</h2>
        <p style="opacity: 0.8; font-size: 13px;">বন্ধুদের ইনভাইট করুন এবং আনলিমিটেড কয়েন জিতুন!</p>
    </div>

    <div class="refer-card">
        <p style="color: #333; font-weight: 500;">Your Referral Code</p>
        <div class="promo-box" id="referCodeBox">LOADING...</div>
        <p class="copy-hint">কোডটির ওপর ক্লিক করে কপি করুন</p>

        <div class="steps">
            <div class="step-item">
                <div class="step-num">1</div>
                <div class="step-text">আপনার রেফার কোডটি বন্ধুদের সাথে শেয়ার করুন।</div>
            </div>
            <div class="step-item">
                <div class="step-num">2</div>
                <div class="step-text">তারা যখন আপনার কোড ব্যবহার করে একাউন্ট খুলবে।</div>
            </div>
            <div class="step-item">
                <div class="step-num">3</div>
                <div class="step-text">প্রতিটি সফল রেফারে আপনি পাবেন <b>৫০ কয়েন</b> বোনাস!</div>
            </div>
        </div>

        <button class="share-btn" id="shareBtn">
            <i class="fas fa-share-alt"></i> Share With Friends
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");
        const referBox = document.getElementById('referCodeBox');

        // ১. টেলিগ্রাম ব্যাক বাটন
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.BackButton.show();
            window.Telegram.WebApp.BackButton.onClick(() => window.location.href = "index.html");
        }

        async function loadReferCode() {
            if (!tgId) return;
            try {
                const snap = await getDoc(doc(db, "users", tgId));
                if (snap.exists()) {
                    const code = snap.data().referCode || "N/A";
                    referBox.innerText = code;
                }
            } catch (e) { console.error(e); }
        }

        // ২. কপি লজিক
        referBox.onclick = () => {
            const code = referBox.innerText;
            if (code === "LOADING...") return;
            navigator.clipboard.writeText(code);
            alert("Refer code copied: " + code);
        };

        // ৩. শেয়ার লজিক (টেলিগ্রাম শেয়ারিং)
        document.getElementById('shareBtn').onclick = () => {
            const code = referBox.innerText;
            const shareText = `EarnPro অ্যাপে জয়েন করুন এবং কয়েন ইনকাম করুন! আমার রেফার কোড: ${code}\nলিঙ্ক: https://t.me/YourBotUserName`;
            
            if (window.Telegram?.WebApp) {
                // সরাসরি টেলিগ্রামে শেয়ার করার লিঙ্ক
                window.open(`https://t.me/share/url?url=https://t.me/YourBotUserName&text=${encodeURIComponent(shareText)}`);
            } else {
                alert("Sharing logic for browsers: \n" + shareText);
            }
        };

        loadReferCode();
    </script>
</body>
</html>
