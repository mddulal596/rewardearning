<script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            if (snap.exists()) {
                const code = snap.data().referCode || "N/A";
                document.getElementById('referCodeBox').innerText = code;

                // সরাসরি আপনার টেলিগ্রাম বটের লিঙ্ক তৈরি করা হয়েছে
                // এটি ইউজারের রেফার কোড সহ বটে নিয়ে যাবে
                const botUsername = "earnpropfficial1_Bot";
                const finalInviteLink = `https://t.me/${botUsername}?start=${code}`;

                // WhatsApp Share লজিক
                document.getElementById('shareWhatsapp').onclick = () => {
                    const text = `🔥 EarnPro বটে জয়েন করে প্রতিদিন টাকা ইনকাম করুন! \n🎁 আমার রেফার কোড: ${code}\n🚀 সরাসরি জয়েন করুন: ${finalInviteLink}`;
                    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
                };

                // রেফার কোড ক্লিক করলে কপি হওয়ার লজিক
                document.getElementById('referCodeBox').onclick = () => {
                    navigator.clipboard.writeText(code);
                    alert("রেফার কোড কপি করা হয়েছে!");
                };
                
                // ইনভাইট লিঙ্ক কপি করার লজিক
                document.getElementById('copyLink').onclick = () => {
                    navigator.clipboard.writeText(finalInviteLink);
                    alert("আপনার ইনভাইট লিঙ্ক কপি হয়েছে!");
                };
            }
        } else {
            window.location.href = "login.html";
        }
    });
</script>
