<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - Earn Pro Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; text-align: center; }
        .refer-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .refer-card { background: white; margin: -30px 20px 20px; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .promo-box { background: #f8f9fa; border: 2px dashed #667eea; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 24px; font-weight: bold; color: #667eea; cursor: pointer; transition: 0.3s; }
        .promo-box:active { transform: scale(0.95); background: #eee; }
        .share-btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        
        .promo-input-card { background: white; margin: 0 20px 20px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .p-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; outline: none; text-align: center; font-size: 16px; box-sizing: border-box; }
        .apply-btn { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 10px; flex: 1; text-align: center; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #667eea; }
    </style>
</head>
<body>

    <div class="refer-header">
        <i class="fas fa-gift" style="font-size: 40px; color: #f1c40f;"></i>
        <h2>Refer & Earn</h2>
        <p style="opacity: 0.8;">বন্ধুদের ইনভাইট করুন এবং ইনকাম বাড়ান!</p>
    </div>

    <div class="refer-card">
        <p style="color: #888; font-size: 14px;">Your Referral Code (Click to Copy)</p>
        <div class="promo-box" id="referCodeBox">LOADING...</div>
        
        <div style="text-align: left; font-size: 14px; color: #555; margin-bottom: 20px;">
            <p>✅ <b>Level 1:</b> বন্ধু জয়েন করলে পাবেন ৫০ কয়েন।</p>
            <p>✅ <b>Level 2:</b> বন্ধুর ইনকাম থেকে পাবেন ১০% কমিশন!</p>
        </div>

        <button class="share-btn" id="shareBtn">
            <i class="fab fa-telegram-plane"></i> Invite Friends
        </button>
    </div>

    <div class="promo-input-card">
        <h4 style="margin-top: 0; color: #333;">Apply Refer/Promo Code</h4>
        <input type="text" id="promoInput" class="p-input" placeholder="Enter code here">
        <button class="apply-btn" id="btnRedeem">Apply Code</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, updateDoc, increment, onSnapshot, collection, query, where, getDocs, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");
        const referBox = document.getElementById('referCodeBox');
        const tg = window.Telegram?.WebApp;

        // ১. নিজের রেফার কোড লোড করা
        if (tgId) {
            onSnapshot(doc(db, "users", tgId), (snap) => {
                if (snap.exists()) {
                    referBox.innerText = snap.data().referCode || "N/A";
                }
            });
        }

        // ২. রেফার এবং প্রোমো কোড লজিক
        document.getElementById('btnRedeem').onclick = async () => {
            const code = document.getElementById('promoInput').value.trim();
            
            if(!code || !tgId) {
                Swal.fire('Error', 'সঠিক কোড লিখুন!', 'warning');
                return;
            }

            try {
                const userRef = doc(db, "users", tgId);
                const userSnap = await getDoc(userRef);
                const userData = userSnap.data();

                // চেক: ইউজার কি আগে কোনো কোড ব্যবহার করেছে?
                if (userData.hasUsedRefer) {
                    Swal.fire('Error', 'আপনি ইতিমধ্যে একটি কোড ব্যবহার করেছেন!', 'error');
                    return;
                }

                // নিজের কোড চেক
                if (code === userData.referCode) {
                    Swal.fire('Error', 'নিজের কোড ব্যবহার করা যাবে না!', 'error');
                    return;
                }

                // ডাটাবেসে রেফার কোডটি খোঁজা
                const q = query(collection(db, "users"), where("referCode", "==", code));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const referrerDoc = querySnapshot.docs[0];
                    const referrerRef = doc(db, "users", referrerDoc.id);

                    // ১. রেফারারকে বোনাস এবং কাউন্ট বাড়ানো
                    await updateDoc(referrerRef, {
                        coins: increment(50),
                        referCount: increment(1) // প্রোফাইল পেজের সাথে মিলানো হলো
                    });

                    // ২. বর্তমান ইউজারকে বোনাস দেওয়া এবং লক করা
                    await updateDoc(userRef, { 
                        coins: increment(20),
                        hasUsedRefer: true 
                    });

                    Swal.fire('Success', 'রেফার সফল! ২০ কয়েন বোনাস পেয়েছেন।', 'success');
                    document.getElementById('promoInput').value = "";

                } else {
                    // ৩. সাধারণ প্রোমো কোড চেক (যদি রেফার কোড না হয়)
                    const validPromos = ["WELCOME50", "PRO8722"];
                    if (validPromos.includes(code)) {
                        await updateDoc(userRef, { 
                            coins: increment(50),
                            hasUsedRefer: true 
                        });
                        Swal.fire('Success', 'প্রোমো বোনাস যোগ হয়েছে!', 'success');
                        document.getElementById('promoInput').value = "";
                    } else {
                        Swal.fire('Error', 'ভুল বা মেয়াদোত্তীর্ণ কোড!', 'error');
                    }
                }
            } catch (e) { 
                console.error(e);
                Swal.fire('Error', 'কিছু একটা ভুল হয়েছে!', 'error');
            }
        };

        // ৩. কপি ফাংশন
        referBox.onclick = () => {
            const code = referBox.innerText;
            if(code === "LOADING..." || code === "N/A") return;
            navigator.clipboard.writeText(code);
            if(tg) tg.HapticFeedback.notificationOccurred('success');
            Swal.fire({ title: 'Copied!', text: code, icon: 'success', timer: 1000, showConfirmButton: false });
        };

        // ৪. শেয়ার ফাংশন (টেলিগ্রাম স্টাইল)
        document.getElementById('shareBtn').onclick = () => {
            const code = referBox.innerText;
            const shareText = `👋 Earn Pro Official অ্যাপে জয়েন করুন এবং ইনকাম শুরু করুন!\n🎁 আমার রেফার কোড ব্যবহার করলে পাবেন বোনাস: ${code}\n\nবট লিঙ্ক: https://t.me/your_bot_username`;
            const telegramUrl = `https://t.me/share/url?url=${encodeURIComponent(shareText)}`;
            window.open(telegramUrl, '_blank');
        };

        if (tg) {
            tg.ready();
            tg.BackButton.show();
            tg.BackButton.onClick(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
