<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - EarnPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; text-align: center; }
        .refer-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .refer-card { background: white; margin: -30px 20px 20px; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .promo-box { background: #f8f9fa; border: 2px dashed #667eea; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 24px; font-weight: bold; color: #667eea; cursor: pointer; }
        .share-btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { color: #888; text-decoration: none; font-size: 10px; flex: 1; }
    </style>
</head>
<body>

    <div class="refer-header">
        <i class="fas fa-gift" style="font-size: 40px; color: #f1c40f;"></i>
        <h2>Refer & Earn</h2>
        <p style="opacity: 0.8;">বন্ধুদের ইনভাইট করুন এবং ইনকাম বাড়ান!</p>
    </div>

    <div class="refer-card">
        <p>Your Referral Code</p>
        <div class="promo-box" id="referCodeBox">LOADING...</div>
        
        <div style="text-align: left; font-size: 14px; color: #555; margin-bottom: 20px;">
            <p>✅ <b>Level 1:</b> বন্ধু জয়েন করলে পাবেন ৫০ কয়েন।</p>
            <p>✅ <b>Level 2:</b> বন্ধুর ইনকাম থেকে পাবেন ১০% কমিশন!</p>
        </div>

        <button class="share-btn" id="shareBtn">
            <i class="fab fa-telegram-plane" style="margin-right: 10px;"></i> Invite Friends
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><br>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i><br>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><br>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><br>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");
        const referBox = document.getElementById('referCodeBox');

        // ১. রেফার কোড লোড করা
        async function init() {
            if (!tgId) return;
            const snap = await getDoc(doc(db, "users", tgId));
            if (snap.exists()) {
                referBox.innerText = snap.data().referCode || "N/A";
            }

            // ২. রেফারেল চেক করা (যদি ইউজার নতুন লিঙ্কে আসে)
            const urlParams = new URLSearchParams(window.location.search);
            const startParam = urlParams.get('startapp'); 
            
            if (startParam && startParam !== snap.data().referCode) {
                // এখানে রেফারেল বোনাস দেওয়ার লজিক কাজ করবে
                console.log("Referred by: " + startParam);
            }
        }

        // ৩. শেয়ার লজিক (Deep Linking)
        document.getElementById('shareBtn').onclick = () => {
            const code = referBox.innerText;
            const botLink = `https://t.me/earnpropfficial1_Bot?start=${code}`;
            const shareText = `👋 EarnPro অ্যাপে জয়েন করে প্রতিদিন টাকা ইনকাম করুন! \n🎁 আমার রেফার কোড: ${code}`;
            window.open(`https://t.me/share/url?url=${encodeURIComponent(botLink)}&text=${encodeURIComponent(shareText)}`);
        };

        init();
    </script>
</body>
</html>
