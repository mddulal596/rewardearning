<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .history-container { padding: 20px; }
        .history-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ddd; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .pending { background: #fff9e6; color: #f1c40f; }
        .approved { background: #e6ffed; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="header"><h2>Withdraw History</h2></div>
    <div class="history-container" id="historyList">Loading...</div>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");
        const historyList = document.getElementById('historyList');

        if (tgId) {
            const q = query(collection(db, "withdrawals"), where("uid", "==", tgId), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<div class="history-card">
                        <div><b>${d.method} - ${d.amount}</b><br><small>${d.number}</small></div>
                        <div class="status-badge ${d.status.toLowerCase()}">${d.status}</div>
                    </div>`;
                });
                historyList.innerHTML = html || "No records found.";
            });
        }
    </script>
</body>
</html>
