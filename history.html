<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw History - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 90px; }
        .top-header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .history-container { padding: 15px; margin-top: -20px; }
        .history-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ccc; }
        .history-info h4 { margin: 0; color: #333; font-size: 15px; }
        .history-info p { margin: 4px 0 0; color: #777; font-size: 11px; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #fffbe6; color: #faad14; }
        .status-approved { background: #f6ffed; color: #52c41a; }
        .border-pending { border-left-color: #faad14; }
        .border-approved { border-left-color: #52c41a; }
        #no-data { text-align: center; padding: 50px; color: #999; display: none; }
        #loader { text-align: center; padding: 50px; color: #667eea; }
    </style>
</head>
<body>

    <div class="top-header">
        <h2 style="margin: 0; font-size: 22px;">Payment History</h2>
        <p style="opacity: 0.8; font-size: 13px;">আপনার সকল পেমেন্ট রেকর্ড</p>
    </div>

    <div class="history-container" id="historyList">
        <div id="loader">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top:10px;">লোড হচ্ছে...</p>
        </div>
        <div id="no-data">
            <i class="fas fa-history fa-3x" style="opacity: 0.2;"></i>
            <p style="margin-top: 15px;">এখনো কোনো উইথড্র করা হয়নি!</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item active"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const userId = localStorage.getItem("tg_user_id");

        async function loadHistory() {
            const listDiv = document.getElementById('historyList');
            const noDataDiv = document.getElementById('no-data');
            const loader = document.getElementById('loader');
            
            if (!userId) { window.location.href = "login.html"; return; }

            try {
                // ইনডেক্সিং ঝামেলা এড়াতে orderBy সরানো হয়েছে
                const q = query(
                    collection(db, "withdrawals"), 
                    where("userId", "==", userId)
                );
                
                const querySnapshot = await getDocs(q);
                loader.style.display = 'none';

                if (querySnapshot.empty) {
                    noDataDiv.style.display = 'block';
                    return;
                }

                // ডাটাগুলো পাওয়ার পর জাভাস্ক্রিপ্ট দিয়ে সর্টিং করা (লেটেস্টগুলো আগে দেখাবে)
                const docs = [];
                querySnapshot.forEach(doc => docs.push(doc.data()));
                docs.sort((a, b) => b.timestamp - a.timestamp);

                docs.forEach((data) => {
                    const status = data.status || "pending";
                    const statusClass = "status-" + status.toLowerCase();
                    const borderClass = "border-" + status.toLowerCase();
                    
                    const card = document.createElement('div');
                    card.className = `history-card ${borderClass}`;
                    card.innerHTML = `
                        <div class="history-info">
                            <h4>${data.method} - ${data.amount} Coins</h4>
                            <p><i class="fas fa-phone-alt"></i> ${data.number}</p>
                            <p><i class="far fa-clock"></i> ${new Date(data.timestamp).toLocaleString()}</p>
                        </div>
                        <div class="status ${statusClass}">${status}</div>
                    `;
                    listDiv.appendChild(card);
                });

            } catch (error) {
                console.error("Error:", error);
                loader.innerHTML = "<p style='color:red;'>ডাটা লোড করতে সমস্যা হয়েছে।</p>";
            }
        }
        loadHistory();
    </script>
</body>
</html>
