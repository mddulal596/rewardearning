<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Earn Pro Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .profile-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); margin-bottom: 12px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #667eea; margin: 0 auto 12px; overflow: hidden; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-card { background: white; margin: -30px 20px 15px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .info-row:last-child { border-bottom: none; }
        .label { color: #888; font-weight: 500; }
        .value { color: #333; font-weight: bold; cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        .stat-box i { font-size: 22px; margin-bottom: 8px; display: block; }
        .stat-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #333; margin-top: 4px; display: block; }
        
        .promo-section { margin: 0 20px 20px; background: white; padding: 10px; border-radius: 15px; display: flex; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #eee; }
        .promo-section input { flex: 1; padding: 12px; border: 1px solid #f0f0f0; border-radius: 10px; outline: none; font-size: 14px; background: #fafafa; }
        .promo-btn { padding: 0 20px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .logout-btn { width: calc(100% - 40px); margin: 0 20px; padding: 15px; background: #fff1f1; border: 1.5px solid #ff4d4d; color: #ff4d4d; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #aaa; text-decoration: none; text-align: center; flex: 1; font-size: 11px; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }
        .nav-item.active { color: #667eea; }
        .vip-active { color: #f1c40f !important; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-img" id="userAvatar"><i class="fas fa-user"></i></div>
        <h3 id="userName" style="margin: 0;">Loading...</h3>
        <p id="userHandle" style="margin: 5px 0 0; opacity: 0.8; font-size: 13px;">@username</p>
    </div>

    <div class="info-card">
        <div class="info-row">
            <span class="label">Balance</span>
            <span class="value" style="color: #667eea;"><span id="profileBalance">0</span> COINS</span>
        </div>
        <div class="info-row" id="copyRefer">
            <span class="label">Refer Code</span>
            <span class="value" id="profileRefer" style="color: #2ecc71;">PRO0000</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <i class="fas fa-users" style="color: #3498db;"></i>
            <span class="stat-title">Refers</span>
            <span id="totalRefer" class="stat-value">0</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-check-circle" style="color: #2ecc71;"></i>
            <span class="stat-title">Tasks</span>
            <span id="totalTask" class="stat-value">0</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-crown" id="vipIcon" style="color: #ccc;"></i>
            <span class="stat-title">VIP Status</span>
            <span id="vipLevel" class="stat-value">No</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-shield-alt" style="color: #e67e22;"></i>
            <span class="stat-title">Status</span>
            <span id="accStatus" class="stat-value">Active</span>
        </div>
    </div>

    <div class="promo-section">
        <input type="text" id="promoInput" placeholder="Enter Promo Code">
        <button class="promo-btn" id="btnRedeem">Apply</button>
    </div>

    <button id="btnLogOut" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit App</button>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot, updateDoc, increment, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tg = window.Telegram?.WebApp;
        const tgId = localStorage.getItem("tg_user_id");

        if (!tgId) {
            window.location.replace("login.html");
        } else {
            // রিয়েলটাইম প্রোফাইল ডাটা লোড
            onSnapshot(doc(db, "users", tgId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('userName').innerText = data.name || "User";
                    document.getElementById('userHandle').innerText = "@" + (data.username || "user");
                    document.getElementById('profileBalance').innerText = (data.coins || 0).toLocaleString();
                    document.getElementById('profileRefer').innerText = data.referCode || "N/A";
                    
                    // ফিক্সড ফিল্ড নাম আপনার ডাটাবেস অনুযায়ী
                    document.getElementById('totalRefer').innerText = data.referCount || 0;
                    document.getElementById('totalTask').innerText = data.taskCount || 0;
                    
                    const isVip = data.isVip || false;
                    document.getElementById('vipLevel').innerText = isVip ? "Yes" : "No";
                    if(isVip) {
                        document.getElementById('vipLevel').classList.add('vip-active');
                        document.getElementById('vipIcon').style.color = "#f1c40f";
                    }
                    
                    document.getElementById('accStatus').innerText = data.status || "Active";
                    
                    if (data.photo) {
                        document.getElementById('userAvatar').innerHTML = `<img src="${data.photo}" alt="Profile">`;
                    }
                }
            });
        }

        // কপি রেফার কোড
        document.getElementById('copyRefer').onclick = () => {
            const code = document.getElementById('profileRefer').innerText;
            if (code === "N/A") return;
            navigator.clipboard.writeText(code);
            if(tg) tg.HapticFeedback?.impactOccurred('medium');
            Swal.fire({ title: 'Copied!', text: code, icon: 'success', timer: 1000, showConfirmButton: false });
        };

        // প্রোমো কোড অ্যাপ্লাই
        document.getElementById('btnRedeem').onclick = async () => {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            if(!code) return Swal.fire('Error', 'কোড লিখুন!', 'warning');
            
            try {
                const userRef = doc(db, "users", tgId);
                const userSnap = await getDoc(userRef);
                const userData = userSnap.data();

                if (userData.usedPromos?.includes(code)) {
                    return Swal.fire('Error', 'এই কোডটি আপনি একবার ব্যবহার করেছেন!', 'error');
                }

                // স্পেশাল প্রোমো কোড চেক
                const promos = { "WELCOME50": 50, "PRO8722": 20, "EARNPRO": 100 };

                if (promos[code]) {
                    await updateDoc(userRef, { 
                        coins: increment(promos[code]), 
                        usedPromos: arrayUnion(code) 
                    });
                    Swal.fire('Success', `${promos[code]} কয়েন বোনাস পেয়েছেন!`, 'success');
                    document.getElementById('promoInput').value = "";
                } else {
                    Swal.fire('Error', 'ভুল বা মেয়াদোত্তীর্ণ কোড!', 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'সার্ভার সমস্যা!', 'error');
            }
        };

        // লগআউট / এক্সিট
        document.getElementById('btnLogOut').onclick = () => {
            Swal.fire({
                title: 'Exit?',
                text: "আপনি কি অ্যাপটি বন্ধ করতে চান?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#667eea',
                cancelButtonColor: '#ff4d4d',
                confirmButtonText: 'Yes, Exit'
            }).then((result) => {
                if (result.isConfirmed) {
                    if (tg) tg.close(); else window.location.replace("login.html");
                }
            });
        };

        if (tg) {
            tg.ready();
            tg.BackButton.show();
            tg.BackButton.onClick(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
