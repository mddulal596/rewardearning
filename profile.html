<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-img-container {
            width: 110px; height: 110px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.2); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 3px solid #fff; position: relative; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .profile-img-container i { font-size: 70px; color: #fff; }
        .upload-overlay { position: absolute; bottom: 0; background: rgba(0,0,0,0.6); width: 100%; font-size: 11px; padding: 3px 0; color: #fff; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 5px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" style="text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px;">
        <div class="profile-img-container" onclick="document.getElementById('profilePicInput').click()">
            <i class="fa fa-user-circle" id="defaultIcon"></i>
            <img id="profileDisplay" src="" alt="Profile">
            <div class="upload-overlay">Change Photo</div>
        </div>
        <input type="file" id="profilePicInput" style="display: none;" accept="image/*">
        
        <h2 id="displayUserName">Loading...</h2>
        <p id="userEmail" style="font-size: 14px; opacity: 0.8;">...</p>
    </div>

    <div class="card">
        <h4><i class="fa fa-user-edit"></i> Edit Your Profile</h4>
        <input type="text" id="userNameInput" placeholder="Enter name" class="input-field">
        <button id="saveProfileBtn" class="btn-main" style="margin-top: 15px; width: 100%;">Update Profile</button>
    </div>

    <div class="card">
        <h4>Statistics</h4>
        <p>Total Balance: <strong id="profileCoins" style="color: #2ecc71;">0</strong> Coins</p>
    </div>

    <div class="card">
        <button id="logoutBtn" class="btn-main" style="background: #e74c3c; border: none;"><i class="fa fa-sign-out-alt"></i> Logout Account</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fa fa-gamepad"></i>Earn</a>
        <a href="tasks.html" class="nav-item"><i class="fa fa-tasks"></i>Tasks</a>
        <a href="withdraw.html" class="nav-item"><i class="fa fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item active"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { auth, db, storage } from './firebase.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-storage.js";

        const profileDisplay = document.getElementById('profileDisplay');
        const defaultIcon = document.getElementById('defaultIcon');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('displayUserName').innerText = data.name || user.email.split('@')[0];
                    document.getElementById('userNameInput').value = data.name || "";
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('profileCoins').innerText = data.coins || 0;

                    if (data.photoURL) {
                        profileDisplay.src = data.photoURL + "?t=" + new Date().getTime();
                        profileDisplay.style.display = 'block';
                        defaultIcon.style.display = 'none';
                    }
                }
            } else { window.location.href = "login.html"; }
        });

        document.getElementById('saveProfileBtn').onclick = async () => {
            const name = document.getElementById('userNameInput').value;
            const file = document.getElementById('profilePicInput').files[0];
            const btn = document.getElementById('saveProfileBtn');

            if (!name.trim()) return alert("Name is required!");
            btn.disabled = true; btn.innerHTML = "Updating...";

            try {
                const user = auth.currentUser;
                let updateData = { name: name };

                if (file) {
                    const storageRef = ref(storage, `profiles/${user.uid}`);
                    await uploadBytes(storageRef, file);
                    updateData.photoURL = await getDownloadURL(storageRef);
                }

                await updateDoc(doc(db, "users", user.uid), updateData);
                alert("Profile Updated!");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false; btn.innerText = "Update Profile";
            }
        };

        document.getElementById('profilePicInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                profileDisplay.src = URL.createObjectURL(file);
                profileDisplay.style.display = 'block';
                defaultIcon.style.display = 'none';
            }
        };

        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm("Logout?")) { await signOut(auth); window.location.href = "login.html"; }
        };
    </script>
</body>
</html>
