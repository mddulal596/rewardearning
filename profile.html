<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .profile-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); font-size: 30px; font-weight: bold; overflow: hidden; }
        .card { background: white; margin: -30px 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .logout-btn { width: 100%; padding: 12px; background: #fff; border: 1px solid #ff4757; color: #ff4757; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { color: #888; text-decoration: none; text-align: center; flex: 1; font-size: 10px; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 2px; }
        .nav-item.active { color: #667eea; }
    </style>
</head>
<body>
    <div class="profile-header">
        <div id="userAvatar" class="profile-img">U</div>
        <h2 id="profileName">Loading...</h2>
        <p id="profileEmail">@username</p>
    </div>

    <div class="card">
        <div class="info-row"><span>Current Balance</span><span style="font-weight: bold; color: #667eea;"><span id="profileBalance">0</span> 💰</span></div>
        <div class="info-row"><span>Refer Code</span><span id="profileRefer" style="font-weight: bold; color: #2ecc71;">---</span></div>
        <div class="info-row"><span>Account Status</span><span style="color: #2ecc71; font-weight: bold;">Active</span></div>
        <button id="btnExit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit App</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const tgId = localStorage.getItem("tg_user_id");

        onSnapshot(doc(db, "users", tgId), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('profileName').innerText = data.name || "User";
                document.getElementById('profileBalance').innerText = data.coins || 0;
                document.getElementById('profileEmail').innerText = "@" + (data.username || "user");
                document.getElementById('profileRefer').innerText = data.referCode || "N/A";
            }
        });

        document.getElementById('btnExit').onclick = () => {
            if(confirm("আপনি কি অ্যাপ থেকে বের হতে চান?")) window.Telegram?.WebApp.close();
        };

        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.BackButton.show();
            window.Telegram.WebApp.BackButton.onClick(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
