<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="balance-card" style="border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; background: var(--primary); padding: 50px 20px; color: white; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <div style="position: relative; display: inline-block;">
            <i class="fas fa-user-circle" style="font-size: 100px; margin-bottom: 10px; opacity: 0.9;"></i>
            <div style="position: absolute; bottom: 15px; right: 5px; background: #27ae60; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white;"></div>
        </div>
        <h2 id="userNameDisp" style="margin: 10px 0 5px; font-weight: 600;">Loading...</h2>
        <p id="userEmailDisp" style="margin: 0; font-size: 14px; opacity: 0.8;">user@example.com</p>
        
        <div style="margin-top: 25px; background: rgba(255,255,255,0.2); display: inline-block; padding: 12px 35px; border-radius: 25px; font-weight: bold; border: 1px solid rgba(255,255,255,0.3);">
            Total Balance: <span id="userCoinsDisp" style="color: #f1c40f; font-size: 20px;">0</span> 💰
        </div>
    </div>

    <div class="card" style="margin-top: -25px; position: relative; z-index: 10;">
        <h4 style="color: #333; margin-bottom: 15px;"><i class="fa fa-edit"></i> Edit Profile Name</h4>
        <input type="text" id="nameInput" placeholder="Enter your full name" class="input-field" style="margin-bottom: 15px;">
        <button id="updateBtn" class="btn-main">Update Name</button>
    </div>

    <div class="card" style="display: flex; justify-content: space-around; text-align: center; padding: 15px;">
        <div>
            <span style="display: block; font-size: 18px; font-weight: bold; color: #764ba2;" id="referCount">0</span>
            <small style="color: #888;">Refers</small>
        </div>
        <div style="border-left: 1px solid #eee; border-right: 1px solid #eee; padding: 0 20px;">
            <span style="display: block; font-size: 18px; font-weight: bold; color: #27ae60;" id="taskCount">0</span>
            <small style="color: #888;">Tasks</small>
        </div>
        <div>
            <span style="display: block; font-size: 18px; font-weight: bold; color: #e74c3c;">Vip</span>
            <small style="color: #888;">Status</small>
        </div>
    </div>

    <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; align-items: center; padding: 5px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000; height: 65px;">
        <a href="index.html" class="nav-item" style="text-align: center; text-decoration: none; flex: 1; color: #888;">
            <i class="fa fa-home" style="font-size: 22px;"></i><br><span style="font-size: 10px;">Home</span>
        </a>
        
        <a href="earn.html" class="nav-item" style="text-align: center; text-decoration: none; flex: 1;">
            <div style="background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -35px auto 0; box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); border: 5px solid white;">
                <i class="fa fa-bolt" style="font-size: 20px;"></i>
            </div>
            <span style="font-size: 10px; color: #888; font-weight: bold; display: block; margin-top: 2px;">Earn</span>
        </a>

        <a href="profile.html" class="nav-item active" style="text-align: center; text-decoration: none; flex: 1; color: #667eea;">
            <i class="fa fa-user" style="font-size: 22px;"></i><br><span style="font-size: 10px;">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('userNameDisp').innerText = data.name || "User";
                    document.getElementById('nameInput').value = data.name || "";
                    document.getElementById('userEmailDisp').innerText = user.email;
                    document.getElementById('userCoinsDisp').innerText = data.coins || 0;
                    
                    // Extra Stats (If available in DB)
                    if(data.referrals) document.getElementById('referCount').innerText = data.referrals;
                    if(data.completedTasks) document.getElementById('taskCount').innerText = data.completedTasks;
                }
            } else { 
                window.location.href = "login.html"; 
            }
        });

        // Update Name Logic
        document.getElementById('updateBtn').onclick = async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('nameInput').value.trim();
            if(!newName) {
                alert("Please enter a valid name.");
                return;
            }
            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, { name: newName });
                alert("Success! Your name has been updated.");
                location.reload();
            } catch (e) { 
                alert("Error: Name could not be updated."); 
            }
        };
    </script>
</body>
    </html>
