<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .avatar { width: 80px; height: 80px; background: white; color: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; margin: 0 auto 15px; border: 4px solid rgba(255,255,255,0.3); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; margin-top: -30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 24px; color: #667eea; margin-bottom: 8px; }
        .exit-btn { margin: 20px; padding: 15px; background: #ffebeb; color: #e74c3c; text-align: center; border-radius: 15px; text-decoration: none; display: block; font-weight: bold; border: 1px solid #ffcfcf; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-decoration: none; color: #888; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar" id="userInitial">U</div>
        <h2 id="userName" style="margin:0;">User Name</h2>
        <p id="userHandle" style="opacity: 0.8; font-size: 14px;">@userid</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-wallet"></i><p style="margin:5px 0; font-size:12px; color:#888;">Balance</p><strong id="userBalance">0</strong></div>
        <div class="stat-card"><i class="fas fa-users"></i><p style="margin:5px 0; font-size:12px; color:#888;">Refers</p><strong id="userRefers">0</strong></div>
        <div class="stat-card"><i class="fas fa-check-circle"></i><p style="margin:5px 0; font-size:12px; color:#888;">Tasks</p><strong id="userTasks">0</strong></div>
        <div class="stat-card"><i class="fas fa-shield-alt"></i><p style="margin:5px 0; font-size:12px; color:#888;">Status</p><strong style="color:#2ecc71;">Active</strong></div>
    </div>

    <a href="#" class="exit-btn" onclick="localStorage.clear(); location.reload();">Logout Account</a>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><br>Home</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i><br>Earn</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><br>Withdraw</a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i><br>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        const tgId = localStorage.getItem("tg_user_id");
        if(tgId) {
            onSnapshot(doc(db, "users", tgId), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('userName').innerText = d.name || "User";
                    document.getElementById('userInitial').innerText = (d.name || "U").charAt(0).toUpperCase();
                    document.getElementById('userBalance').innerText = (d.coins || 0).toLocaleString();
                    document.getElementById('userHandle').innerText = "@" + tgId;
                }
            });
        }
    </script>
</body>
</html>
