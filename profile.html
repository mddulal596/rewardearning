<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="card" style="text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px;">
        <div id="profileImageClick" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; margin: 0 auto; border: 3px solid white; cursor: pointer;" onclick="document.getElementById('profilePicInput').click()">
            <i class="fa fa-user-circle" id="profileIcon" style="font-size: 80px;"></i>
            <img id="profilePreview" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
        </div>
        <input type="file" id="profilePicInput" style="display: none;" accept="image/*">
        <h2 id="profileName">Loading...</h2>
        <p id="profileEmail">...</p>
    </div>

    <div class="card">
        <h4>Edit Profile</h4>
        <input type="text" id="newNameInput" placeholder="Enter new name" class="input-field" style="width: 100%; padding: 10px; margin: 10px 0;">
        <button id="updateBtn" class="btn-main" style="width: 100%;">Save Changes</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa fa-home"></i>Home</a>
        <a href="profile.html" class="nav-item active"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { auth, db, storage } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-storage.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('profileName').innerText = data.name || "User";
                    document.getElementById('profileEmail').innerText = user.email;
                    if (data.photoURL) {
                        document.getElementById('profilePreview').src = data.photoURL;
                        document.getElementById('profilePreview').style.display = 'block';
                        document.getElementById('profileIcon').style.display = 'none';
                    }
                }
            }
        });

        document.getElementById('updateBtn').onclick = async () => {
            const user = auth.currentUser;
            const name = document.getElementById('newNameInput').value;
            const file = document.getElementById('profilePicInput').files[0];
            const btn = document.getElementById('updateBtn');
            btn.innerText = "Saving...";

            let updateData = { name: name };
            if (file) {
                const storageRef = ref(storage, `profiles/${user.uid}`);
                await uploadBytes(storageRef, file);
                updateData.photoURL = await getDownloadURL(storageRef);
            }
            await updateDoc(doc(db, "users", user.uid), updateData);
            alert("Updated!");
            location.reload();
        };

        document.getElementById('profilePicInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('profilePreview').src = URL.createObjectURL(file);
                document.getElementById('profilePreview').style.display = 'block';
                document.getElementById('profileIcon').style.display = 'none';
            }
        };
    </script>
</body>
</html>
