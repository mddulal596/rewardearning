<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .profile-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); font-size: 30px; font-weight: bold; }
        .card { background: white; margin: -30px 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .logout-btn { width: 100%; padding: 12px; background: #fff; border: 1px solid #ff4757; color: #ff4757; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .logout-btn:active { background: #ff4757; color: white; }
    </style>
</head>
<body>
    <div class="profile-header">
        <div id="userAvatar" class="profile-img">U</div>
        <h2 id="profileName" style="margin: 5px 0;">Loading...</h2>
        <p id="profileEmail" style="margin: 0; opacity: 0.8; font-size: 14px;">@username</p>
    </div>

    <div class="card">
        <div class="info-row">
            <span>Current Balance</span>
            <span style="font-weight: bold; color: #667eea;"><span id="profileBalance">0</span> 💰</span>
        </div>
        <div class="info-row">
            <span>Refer Code</span>
            <span id="profileRefer" style="font-weight: bold; color: #2ecc71;">---</span>
        </div>
        <div class="info-row">
            <span>Account Status</span>
            <span style="color: #2ecc71; font-weight: bold;">Active</span>
        </div>
        
        <button id="btnLogOut" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit App</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // ১. লোকাল স্টোরেজ থেকে আইডি নেওয়া
        const tgId = localStorage.getItem("tg_user_id");

        if (tgId) {
            // ২. রিয়েল-টাইম ডাটা লিসেনার
            onSnapshot(doc(db, "users", tgId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('profileName').innerText = data.name || "User";
                    document.getElementById('profileBalance').innerText = data.coins || 0;
                    document.getElementById('profileEmail').innerText = "@" + (data.username || "user");
                    document.getElementById('profileRefer').innerText = data.referCode || "N/A";
                    
                    // নামের প্রথম অক্ষর দিয়ে অবতার তৈরি
                    document.getElementById('userAvatar').innerText = data.name ? data.name.charAt(0).toUpperCase() : "U";
                } else {
                    window.location.replace("login.html");
                }
            });
        } else {
            window.location.replace("login.html");
        }

        // ৩. এক্সিট লজিক (যেহেতু এটি টেলিগ্রাম অ্যাপ, সেশন ক্লিয়ার করে ক্লোজ করা)
        document.getElementById('btnLogOut').onclick = () => {
            if(confirm("আপনি কি অ্যাপ থেকে বের হতে চান?")) {
                localStorage.clear();
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.close(); // টেলিগ্রাম অ্যাপ সরাসরি বন্ধ করে দেবে
                } else {
                    window.location.replace("login.html");
                }
            }
        };
    </script>
</body>
</html>
