<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="balance-card" style="border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;">
        <i class="fas fa-user-circle" style="font-size: 100px; margin-bottom: 10px; opacity: 0.9;"></i>
        <h2 id="userNameDisplay" style="margin: 10px 0 5px;">Loading...</h2>
        <p id="userEmailDisplay" style="margin: 0; font-size: 14px; opacity: 0.8;">...</p>
        <div style="margin-top: 20px; background: rgba(255,255,255,0.2); display: inline-block; padding: 10px 30px; border-radius: 25px; font-weight: bold;">
            Total Balance: <span id="userBalanceDisplay">0</span> 💰
        </div>
    </div>

    <div class="card" style="margin-top: -20px; border-radius: 20px;">
        <h4 style="color: #333; margin-bottom: 15px;">Edit Profile Name</h4>
        <input type="text" id="nameInput" placeholder="Enter full name" class="input-field">
        <button id="updateBtn" class="btn-main" style="margin-top: 10px;">Save Changes</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa fa-home"></i>Home</a>
        <a href="profile.html" class="nav-item active"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('userNameDisplay').innerText = data.name || "User";
                    document.getElementById('nameInput').value = data.name || "";
                    document.getElementById('userEmailDisplay').innerText = user.email;
                    document.getElementById('userBalanceDisplay').innerText = data.coins || 0;
                }
            } else { window.location.href = "login.html"; }
        });

        document.getElementById('updateBtn').onclick = async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('nameInput').value;
            if(!newName) return;
            try {
                await updateDoc(doc(db, "users", user.uid), { name: newName });
                alert("Profile Updated!");
                location.reload();
            } catch (e) { alert("Error!"); }
        };
    </script>
</body>
</html>
