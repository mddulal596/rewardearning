<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div style="text-align: center; padding: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;">
        <div style="font-size: 100px; margin-bottom: 10px;">
            <i class="fas fa-user-circle"></i>
        </div>
        <h2 id="userNameDisplay">Loading...</h2>
        <p id="userEmailDisplay">...</p>
        <div style="margin-top: 15px; background: rgba(255,255,255,0.2); display: inline-block; padding: 8px 25px; border-radius: 20px;">
            Total Coins: <span id="userBalanceDisplay">0</span>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h4 style="margin-bottom: 15px; color: #333;">Update Name</h4>
        <input type="text" id="nameInput" placeholder="Enter new name" class="input-field" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;">
        <button id="updateBtn" class="btn-main" style="width: 100%; background: #764ba2;">Save Changes</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa fa-home"></i>Home</a>
        <a href="profile.html" class="nav-item active"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('userNameDisplay').innerText = data.name || "User";
                    document.getElementById('nameInput').value = data.name || "";
                    document.getElementById('userEmailDisplay').innerText = user.email;
                    document.getElementById('userBalanceDisplay').innerText = data.coins || 0;
                }
            } else { window.location.href = "login.html"; }
        });

        document.getElementById('updateBtn').onclick = async () => {
            const user = auth.currentUser;
            const newName = document.getElementById('nameInput').value;
            if(!newName) return alert("Enter a name");
            
            try {
                await updateDoc(doc(db, "users", user.uid), { name: newName });
                alert("Name updated successfully!");
                location.reload();
            } catch (e) { alert("Error updating name."); }
        };
    </script>
</body>
</html>
