<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px;">

    <div style="border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 50px 20px; color: white; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <div style="position: relative; display: inline-block;">
            <img id="userImgDisp" src="https://ui-avatars.com/api/?name=User&background=random" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); object-fit: cover; margin-bottom: 10px;">
            <div style="position: absolute; bottom: 15px; right: 5px; background: #27ae60; width: 18px; height: 18px; border-radius: 50%; border: 2px solid white;"></div>
        </div>
        <h2 id="userNameDisp" style="margin: 10px 0 5px; font-weight: 600;">Loading...</h2>
        <p id="userUsernameDisp" style="margin: 0; font-size: 14px; opacity: 0.8;">@username</p>
        
        <div style="margin-top: 25px; background: rgba(255,255,255,0.2); display: inline-block; padding: 12px 35px; border-radius: 25px; font-weight: bold; border: 1px solid rgba(255,255,255,0.3);">
            Balance: <span id="userCoinsDisp" style="color: #f1c40f; font-size: 20px;">0</span> 💰
        </div>
    </div>

    <div style="margin: -25px 20px 20px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; z-index: 10;">
        <h4 style="color: #333; margin-top: 0; margin-bottom: 15px;"><i class="fa fa-user-edit"></i> Profile Settings</h4>
        <label style="font-size: 12px; color: #888; font-weight: bold;">Full Name</label>
        <input type="text" id="nameInput" placeholder="Enter your name" style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 15px; margin-top: 5px; box-sizing: border-box; outline: none;">
        <button id="updateBtn" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Update Profile</button>
    </div>

    <div style="margin: 0 20px; background: white; padding: 20px; border-radius: 20px; display: flex; justify-content: space-around; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.03);">
        <div>
            <span style="display: block; font-size: 18px; font-weight: bold; color: #764ba2;" id="referCount">0</span>
            <small style="color: #888;">Refers</small>
        </div>
        <div style="border-left: 1px solid #eee; border-right: 1px solid #eee; padding: 0 20px;">
            <span style="display: block; font-size: 18px; font-weight: bold; color: #27ae60;" id="taskCount">0</span>
            <small style="color: #888;">Tasks Done</small>
        </div>
        <div>
            <span style="display: block; font-size: 18px; font-weight: bold; color: #e74c3c;">Active</span>
            <small style="color: #888;">Account</small>
        </div>
    </div>

    <div style="padding: 20px;">
        <button id="logoutBtn" style="width: 100%; padding: 12px; background: #fff; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;">
            <i class="fa fa-sign-out-alt"></i> Log Out
        </button>
    </div>

    <nav style="position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; align-items: center; padding: 10px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000; height: 65px;">
        <a href="index.html" style="text-align: center; text-decoration: none; flex: 1; color: #888;">
            <i class="fa fa-home" style="font-size: 20px;"></i><br><span style="font-size: 10px;">Home</span>
        </a>
        <a href="earn.html" style="text-align: center; text-decoration: none; flex: 1; color: #888;">
            <i class="fa fa-bolt" style="font-size: 20px;"></i><br><span style="font-size: 10px;">Earn</span>
        </a>
        <a href="withdraw.html" style="text-align: center; text-decoration: none; flex: 1; color: #888;">
            <i class="fa fa-wallet" style="font-size: 20px;"></i><br><span style="font-size: 10px;">Withdraw</span>
        </a>
        <a href="profile.html" style="text-align: center; text-decoration: none; flex: 1; color: #667eea;">
            <i class="fa fa-user" style="font-size: 20px;"></i><br><span style="font-size: 10px;">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const userId = localStorage.getItem("user_uid");

        async function loadProfile() {
            if (!userId) {
                window.location.href = "login.html";
                return;
            }

            const userRef = doc(db, "users", userId);
            try {
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    
                    // Display User Info
                    document.getElementById('userNameDisp').innerText = data.name || "User Name";
                    document.getElementById('nameInput').value = data.name || "";
                    document.getElementById('userUsernameDisp').innerText = data.username ? "@" + data.username : "@mddulal596";
                    document.getElementById('userCoinsDisp').innerText = data.coins || 0;
                    document.getElementById('referCount').innerText = data.referCount || 0;
                    document.getElementById('taskCount').innerText = data.taskCount || 0;

                    const profileImg = document.getElementById('userImgDisp');
                    if (data.photo && data.photo.trim() !== "") {
                        profileImg.src = data.photo;
                    } else {
