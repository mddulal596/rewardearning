<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .profile-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; margin-bottom: 10px; }
        .card { background: white; margin: -30px 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logout-btn { width: 100%; padding: 12px; background: #fff; border: 1px solid #ff4757; color: #ff4757; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="profile-header">
        <div id="userAvatar" class="profile-img" style="background:#444; display:inline-flex; align-items:center; justify-content:center; font-size:40px;">US</div>
        <h2 id="profileName">Loading...</h2>
        <p id="profileEmail">@username</p>
        <div style="background: rgba(255,255,255,0.2); display: inline-block; padding: 5px 15px; border-radius: 20px;">Balance: <span id="profileBalance">0</span> 💰</div>
    </div>

    <div class="card">
        <button id="btnLogOut" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Log Out</button>
    </div>

    <nav style="position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000;">
        <a href="index.html" style="color:#888;"><i class="fa fa-home fa-lg"></i></a>
        <a href="earn.html" style="color:#888;"><i class="fa fa-play-circle fa-lg"></i></a>
        <a href="#" id="profileShareBtn" style="color:#888;"><i class="fa fa-share-alt fa-lg"></i></a>
        <a href="profile.html" style="color:#667eea;"><i class="fa fa-user fa-lg"></i></a>
    </nav>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('profileName').innerText = data.name || "User";
                    document.getElementById('profileBalance').innerText = data.coins || 0;
                    document.getElementById('profileEmail').innerText = "@" + (data.username || "user");

                    // শেয়ার বাটন রিডাইরেক্ট লজিক
                    document.getElementById('profileShareBtn').onclick = (e) => {
                        e.preventDefault();
                        const botUser = "earnpropfficial1_Bot";
                        window.location.href = `https://t.me/${botUser}?start=${data.referCode || ''}`;
                    };
                }
            } else { window.location.href = "login.html"; }
        });

        // লগআউট লজিক (পেন্ডিং সমস্যা সমাধান)
        document.getElementById('btnLogOut').onclick = async () => {
            if(confirm("আপনি কি লগআউট করতে চান?")) {
                try {
                    await signOut(auth);
                    localStorage.clear();
                    window.location.replace("login.html");
                } catch (e) { alert("Error logging out!"); }
            }
        };
    </script>
</body>
</html>
