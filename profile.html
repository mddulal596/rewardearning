<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-img-container {
            width: 110px; height: 110px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.2); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 3px solid #fff; position: relative; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .profile-img-container i { font-size: 70px; color: #fff; }
        .upload-overlay { position: absolute; bottom: 0; background: rgba(0,0,0,0.6); width: 100%; font-size: 11px; padding: 3px 0; color: #fff; }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 5px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" style="text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px;">
        <div class="profile-img-container" onclick="document.getElementById('profilePicInput').click()">
            <i class="fa fa-user-circle" id="defaultIcon"></i>
            <img id="profileDisplay" src="" alt="Profile">
            <div class="upload-overlay">Change Photo</div>
        </div>
        <input type="file" id="profilePicInput" style="display: none;" accept="image/*">
        
        <h2 id="displayUserName" style="margin-bottom: 5px;">Loading...</h2>
        <p id="userEmail" style="font-size: 14px; opacity: 0.8; margin: 0;">...</p>
    </div>

    <div class="card">
        <h4><i class="fa fa-user-edit"></i> Edit Your Profile</h4>
        <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">Full Name</label>
        <input type="text" id="userNameInput" placeholder="Enter your name" class="input-field">
        <button id="saveProfileBtn" class="btn-main" style="margin-top: 15px; width: 100%;">Update Profile</button>
    </div>

    <div class="card" style="background: #f9f9f9;">
        <h4 style="margin-bottom: 15px;">Statistics</h4>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border-radius: 10px; border: 1px solid #eee;">
            <span><i class="fa fa-coins" style="color: #ffd700;"></i> Total Balance:</span>
            <strong id="profileCoins" style="font-size: 18px; color: #2ecc71;">0</strong>
        </div>
    </div>

    <div class="card">
        <button id="logoutBtn" class="btn-main" style="background: #e74c3c; width: 100%; border: none;"><i class="fa fa-sign-out-alt"></i> Logout Account</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa fa-home"></i>Home</a>
        <a href="earn.html" class="nav-item"><i class="fa fa-gamepad"></i>Earn</a>
        <a href="tasks.html" class="nav-item"><i class="fa fa-tasks"></i>Tasks</a>
        <a href="withdraw.html" class="nav-item"><i class="fa fa-wallet"></i>Withdraw</a>
        <a href="profile.html" class="nav-item active"><i class="fa fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { auth, db, storage } from './firebase.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-storage.js";

        const profileDisplay = document.getElementById('profileDisplay');
        const defaultIcon = document.getElementById('defaultIcon');

        // ১. ইউজারের বর্তমান তথ্য লোড করা
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    
                    // নাম ও ইমেইল সেট করা
                    const currentName = data.name || user.email.split('@')[0];
                    document.getElementById('displayUserName').innerText = currentName;
                    document.getElementById('userNameInput').value = currentName;
                    document.getElementById('userEmail').innerText = user.email;
                    
                    // ব্যালেন্স বা কয়েন সেট করা (এটি যেন কখনো ০ না দেখায় যদি ডাটা থাকে)
                    document.getElementById('profileCoins').innerText = (data.coins !== undefined) ? data.coins : 0;

                    // ছবি লোড করা (টাইমস্ট্যাম্প যোগ করা হয়েছে ক্যাশ এড়াতে)
                    if (data.photoURL) {
                        profileDisplay.src = data.photoURL + "?t=" + new Date().getTime();
                        profileDisplay.style.display = 'block';
                        defaultIcon.style.display = 'none';
                    }
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // ২. প্রোফাইল আপডেট লজিক
        document.getElementById('saveProfileBtn').onclick = async () => {
            const name = document.getElementById('userNameInput').value;
            const fileInput = document.getElementById('profilePicInput');
            const file = fileInput.files[0];
            const submitBtn = document.getElementById('saveProfileBtn');

            if (!name.trim()) return alert("Name cannot be empty!");

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Updating...';

            try {
                const user = auth.currentUser;
                const userRef = doc(db, "users", user.uid);
                
                // শুধুমাত্র নাম এবং ছবি আপডেট হবে, ব্যালেন্স (coins) ঠিক থাকবে
                let updateData = { name: name };

                if (file) {
                    const storageRef = ref(storage, `profiles/${user.uid}`);
                    await uploadBytes(storageRef, file);
                    const photoURL = await getDownloadURL(storageRef);
                    updateData.photoURL = photoURL;
                }

                // updateDoc ব্যবহার করা হয়েছে যাতে অন্য ডাটা নিরাপদ থাকে
                await updateDoc(userRef, updateData);
                
                alert("Profile Updated Successfully!");
                window.location.reload(); // পেজ রিফ্রেশ করে নতুন ডাটা দেখাবে
            } catch (err) {
                alert("Error: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Profile";
            }
        };

        // ৩. ছবি সিলেক্ট করার সাথে সাথে প্রিভিউ
        document.getElementById('profilePicInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                profileDisplay.src = URL.createObjectURL(file);
                profileDisplay.style.display = 'block';
                defaultIcon.style.display = 'none';
            }
        };

        // ৪. লগআউট ফাংশন
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm("Do you really want to logout?")) {
                await signOut(auth);
                window.location.href = "login.html";
            }
        };
    </script>
</body>
</html>
